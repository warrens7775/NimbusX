services:
  lago:
    image: getlago/lago:latest
    container_name: nimbusx-lago
    restart: unless-stopped
    environment:
      LAGO_FRONT_URL: http://localhost:8080
      LAGO_API_URL: http://localhost:8080
      API_URL: http://localhost:8080
    ports:
      - "8080:80"
      - "3000:3000"
    volumes:
      - lago-data:/app/storage
      - lago-app-data:/data
      - ./docker/lago-nginx.conf:/etc/nginx/extra-conf.d/lago-api.conf:ro

volumes:
  lago-data:
  lago-app-data:
