<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Console - NimbusX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="auth.css?v=29" />
</head>
<body class="dashboard-page admin-page" data-admin-page="overview" data-admin-loading="true">
  <div id="adminLoginShell" class="admin-login-shell">
    <section class="auth-card">
      <a class="brand" href="/" aria-label="NimbusX home">
        <span class="brand-mark">N</span>
        <span>NimbusX</span>
      </a>
      <h1>Admin Console</h1>
      <p>Sign in with an account that has admin console access.</p>

      <form id="adminLoginForm">
        <label>
          Work Email
          <input id="adminEmail" type="email" placeholder="owner@nimbusx.com" required />
        </label>
        <label>
          Password
          <input id="adminPassword" type="password" placeholder="Enter password" required />
        </label>
        <button class="btn" type="submit">Enter Console</button>
      </form>
      <p id="adminLoginMessage" class="form-message"></p>
      <a class="back" href="/">&larr; Back to website</a>
    </section>
  </div>

  <div id="adminApp" class="dash-layout" hidden>
    <aside class="dash-sidebar">
      <a class="brand dash-brand" href="/" aria-label="NimbusX home">
        <span class="brand-mark">N</span>
        <span>NimbusX</span>
      </a>
      <div class="menu-section admin-menu">
        <button id="adminToggle" class="menu-title menu-title-btn" type="button" aria-expanded="true">
          Administration <span class="menu-caret">▾</span>
        </button>
        <div id="adminMenuList" class="admin-menu-list open">
          <a class="menu-item active" href="admin" data-admin-view-button="overview">Overview</a>
          <a class="menu-item" href="admin-users" data-admin-view-button="users">Users</a>
          <a class="menu-item" href="admin-groups" data-admin-view-button="groups">Groups</a>
          <a class="menu-item" href="admin-leads" data-admin-view-button="leads">Leads</a>
        </div>
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-topbar admin-dashboard-topbar">
        <div class="admin-meta">
          <span id="adminRoleBadge" class="admin-badge">Admin</span>
          <button id="refreshButton" class="admin-button" type="button">Refresh</button>
          <button id="logoutButton" class="admin-button danger" type="button">Logout</button>
        </div>
      </header>

      <section class="vm-header">
        <div>
          <h1>Admin Console</h1>
          <p id="adminSummary" class="admin-dashboard-summary">Loading session</p>
        </div>
      </section>

      <section class="admin-page-section">
        <section class="admin-overview-grid" id="overviewGrid"></section>
        <article class="admin-card admin-activity-card">
          <div class="admin-section-header">
            <div>
              <h2>Activity</h2>
              <p class="admin-muted">Recent admin actions and platform changes.</p>
            </div>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Action</th>
                  <th>Actor</th>
                  <th>Target</th>
                  <th>Details</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody id="auditTableBody"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="theme.js?v=3"></script>
  <script src="admin.js?v=11"></script>
  <script src="script.js?v=10"></script>
</body>
</html>
